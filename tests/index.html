<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider Chart animé D3</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrapper">
    <h1>Spider Chart animé</h1>
    <p>Comparer des individus sur 5 dimensions</p>

    <div class="controls">
      <label for="person1">Individu 1 :</label>
      <select id="person1"></select>

      <label for="person2">Individu 2 :</label>
      <select id="person2"></select>
    </div>

    <div id="chart"></div>
    <div id="legend" class="legend"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="script.js"></script>
</body>
</html>
